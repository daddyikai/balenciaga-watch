name: Balenciaga Bag Watch

on:
  schedule:
    # Runs every 15 minutes, Mon-Fri, 12:00-19:00 Taipei time (UTC+8) = 04:00-11:00 UTC.
    - cron: "0,15,30,45 4-11 * * 1-5"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Send a test notification issue instead of checking the site"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TEST_MODE: ${{ inputs.test_mode }}
        working-directory: scripts
        run: python check_balenciaga.py

      - name: Commit updated state
        run: |
          git config user.name "balenciaga-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "chore: update state [skip ci]"
          git push
